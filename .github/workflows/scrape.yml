name: TradingView Scraper

# Runs on a schedule AND lets you trigger it by hand from the Actions tab.
on:
  schedule:
    # Every 6 hours (UTC). GitHub cron is UTC-only and may start 10-30 min late.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Indicators per run (each chained run does this many)"
        required: false
        default: "50"
      start_override:
        description: "Start index. Set this to run a bounded auto-chain (does NOT touch the cursor). Leave blank to resume the scheduled cursor."
        required: false
        default: ""
      end_override:
        description: "FINAL end index of the chained job (e.g. 5000). The run walks start→end in batch_size steps, auto-triggering the next batch each time. Blank = go to the last index."
        required: false
        default: ""

# contents: write -> push the cursor commit. actions: write -> let this run
# dispatch the next chained batch of itself (workflow_dispatch self-trigger).
permissions:
  contents: write
  actions: write

# Never let two runs overlap (schedule + manual). The second one waits.
concurrency:
  group: tv-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Hard ceiling below the 6-hour GitHub limit so a stuck run can't burn a whole slot.
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Restore the most recent logged-in Chromium profile so we skip the login form.
      - name: Restore browser profile (login session)
        uses: actions/cache/restore@v4
        with:
          path: User_Data
          key: tv-user-data-v2-${{ github.run_id }}
          restore-keys: |
            tv-user-data-v2-

      # Cache the Playwright browser binary so installs are fast after the first run.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb rclone
          npm install
          npx playwright install --with-deps chromium

      # If the cache missed (first run, or evicted after ~7 days idle), inject the
      # committed encrypted session (ci/session.enc) into a fresh profile so the
      # runner starts logged in — avoiding a cold login from GitHub's flagged
      # datacenter IP. Chromium re-encrypts the cookies Linux-native here, which a
      # raw Windows profile copy could not do (its cookie key is DPAPI-locked).
      - name: Seed login session (if no cached profile)
        env:
          SESSION_ENCRYPTION_KEY: ${{ secrets.SESSION_ENCRYPTION_KEY }}
        run: |
          if [ -d "User_Data/Default" ]; then
            echo "Cached logged-in profile present — using it."
          elif [ -f "ci/session.enc" ] && [ -n "$SESSION_ENCRYPTION_KEY" ]; then
            echo "No cached profile — seeding session from ci/session.enc."
            xvfb-run -a --server-args="-screen 0 1920x1080x24" node ci/seed_import.js
          else
            echo "::warning::No cached profile and no usable seed — will attempt a fresh login (may be challenged)."
          fi

      # Write the rclone config (Google Drive OAuth token) from a Secret so the
      # runner can upload outputs to your Drive. The Secret is base64 of your
      # local rclone.conf and must contain a remote named [gdrive].
      - name: Configure rclone (Google Drive)
        env:
          RCLONE_CONF_BASE64: ${{ secrets.RCLONE_CONF_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONF_BASE64" ]; then
            echo "::error::RCLONE_CONF_BASE64 secret is missing — add it (see SETUP_GITHUB_ACTIONS.md)."
            exit 1
          fi
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF_BASE64" | base64 -d > ~/.config/rclone/rclone.conf
          rclone --config ~/.config/rclone/rclone.conf listremotes

      # Pull the cumulative status master down first so pipeline.js merges into
      # it instead of overwriting the Drive copy with only this batch's rows.
      - name: Restore status master from Drive
        run: |
          mkdir -p Finalop1lack
          rclone copy "gdrive:Finalop1lack/download_status.csv" Finalop1lack/ \
            --config ~/.config/rclone/rclone.conf 2>/dev/null || \
            echo "No existing download_status.csv on Drive yet (first run) — starting fresh."

      # Fold the committed history baseline (ci/seed_status.csv) into the status
      # master WITHOUT overwriting anything newer. Idempotent — safe every run.
      # This is how the pre-existing local history (indices 480-1263) gets in
      # without needing local rclone to see the runner's Drive files.
      - name: Seed status history (merge baseline)
        run: node ci/merge_status.js

      # Work out which slice of indices to do this run.
      #   * Manual (start_override set): a BOUNDED auto-chain. Do batch_size
      #     indices from start_override, then the "Trigger next" step re-dispatches
      #     with start = this batch's end + 1, until we pass end_override. The
      #     saved cursor is never touched, so the schedule keeps its own place.
      #   * Scheduled (no start_override): resume from the saved cursor, one batch,
      #     and advance the cursor. No chaining.
      - name: Plan this batch
        id: plan
        run: |
          INPUT="InputForScript/unique_indicator_names.txt"
          START=$(grep -oE '^[0-9]+' "$INPUT" | sort -n | head -1)
          END=$(grep -oE '^[0-9]+' "$INPUT" | sort -n | tail -1)
          BATCH="${{ github.event.inputs.batch_size }}"
          # Coerce blank / 0 / negative / non-numeric to the default 50. The bare
          # "${BATCH:-50}" only catches EMPTY, not "0" — a 0 built an inverted
          # range like --from 5240 --to 5239 and crashed the scraper.
          if ! printf '%s' "$BATCH" | grep -qE '^[0-9]+$' || [ "$BATCH" -lt 1 ]; then
            echo "batch_size '$BATCH' is invalid — using 50."
            BATCH=50
          fi
          CURSOR_FILE="ci/state/cursor.txt"

          FROM_IN="${{ github.event.inputs.start_override }}"
          TO_IN="${{ github.event.inputs.end_override }}"

          if [ -n "$FROM_IN" ]; then
            # ---------- Manual bounded chain ----------
            MANUAL="true"
            FINAL_END="${TO_IN:-$END}"
            if [ "$FINAL_END" -gt "$END" ]; then FINAL_END="$END"; fi

            if [ "$FROM_IN" -gt "$FINAL_END" ]; then
              echo "Start $FROM_IN is past target end $FINAL_END — chain complete."
              echo "done=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            FROM="$FROM_IN"
            TO=$(( FROM + BATCH - 1 ))
            if [ "$TO" -gt "$FINAL_END" ]; then TO="$FINAL_END"; fi
            NEXT=$(( TO + 1 ))
            if [ "$NEXT" -le "$FINAL_END" ]; then CHAIN="true"; else CHAIN="false"; fi

            echo "done=false"           >> "$GITHUB_OUTPUT"
            echo "manual=$MANUAL"        >> "$GITHUB_OUTPUT"
            echo "chain=$CHAIN"          >> "$GITHUB_OUTPUT"
            echo "from=$FROM"            >> "$GITHUB_OUTPUT"
            echo "to=$TO"                >> "$GITHUB_OUTPUT"
            echo "next=$NEXT"            >> "$GITHUB_OUTPUT"
            echo "final_end=$FINAL_END"  >> "$GITHUB_OUTPUT"
            echo "batch=$BATCH"          >> "$GITHUB_OUTPUT"
            echo "Manual chain: $FROM..$TO of target $FROM_IN..$FINAL_END (more to come: $CHAIN)"
          else
            # ---------- Scheduled: resume from cursor ----------
            MANUAL="false"
            if [ -f "$CURSOR_FILE" ] && [ -s "$CURSOR_FILE" ]; then
              CUR=$(tr -dc '0-9' < "$CURSOR_FILE")
            else
              CUR="$START"
            fi

            if [ "$CUR" -gt "$END" ]; then
              echo "Cursor $CUR is past the last index $END — nothing left to scrape."
              echo "done=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            FROM="$CUR"
            TO=$(( CUR + BATCH - 1 ))
            if [ "$TO" -gt "$END" ]; then TO="$END"; fi

            echo "done=false"          >> "$GITHUB_OUTPUT"
            echo "manual=$MANUAL"      >> "$GITHUB_OUTPUT"
            echo "chain=false"         >> "$GITHUB_OUTPUT"
            echo "from=$FROM"          >> "$GITHUB_OUTPUT"
            echo "to=$TO"              >> "$GITHUB_OUTPUT"
            echo "next=$(( TO + 1 ))"  >> "$GITHUB_OUTPUT"
            echo "Scheduled: indices $FROM..$TO (last index is $END)"
          fi

      # Cache the pre-scraped library ZIP so it downloads from Drive only once,
      # then restores from cache in seconds on every later run. Bump the key
      # (v1 -> v2) whenever you upload a newer allscripts.zip to Drive.
      - name: Restore allscripts library zip (cache)
        id: allscripts_cache
        uses: actions/cache@v4
        with:
          path: allscripts.zip
          key: allscripts-zip-v1

      - name: Download allscripts library (if cache miss)
        if: steps.allscripts_cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — pulling allscripts.zip from Drive."
          rclone copy "gdrive:Finalop1lack/allscripts.zip" . \
            --config ~/.config/rclone/rclone.conf --stats-one-line -v || true

      # Extract the library into Finalop1lack/allscripts so pipeline.js can copy
      # from it and skip Phase 1 scraping for scripts we already have. If the ZIP
      # is missing, we just log a warning and scrape normally (nothing breaks).
      - name: Extract allscripts library
        run: |
          if [ -f allscripts.zip ]; then
            mkdir -p Finalop1lack
            unzip -q -o allscripts.zip -d Finalop1lack/
            echo "Library ready: $(find Finalop1lack/allscripts -type f 2>/dev/null | wc -l) scripts."
          else
            echo "::warning::allscripts.zip not found — Phase 1 cache disabled this run (will scrape normally)."
          fi

      - name: Run scraper
        id: run
        if: steps.plan.outputs.done == 'false'
        env:
          TRADINGVIEW_EMAIL: ${{ secrets.TRADINGVIEW_EMAIL }}
          TRADINGVIEW_PASSWORD: ${{ secrets.TRADINGVIEW_PASSWORD }}
        run: |
          # Drop stale Chromium singleton locks that a cross-machine cached
          # profile carries, otherwise Chromium refuses to launch ("profile
          # appears to be in use by another process on another computer").
          rm -f User_Data/Singleton* 2>/dev/null || true
          # Give Xvfb a real 1920x1080x24 screen so --start-maximized and the
          # 1920x1080 viewport render at full size (the xvfb-run default is a
          # tiny 8-bit screen, which can break TradingView's layout).
          xvfb-run -a --server-args="-screen 0 1920x1080x24" node pipeline.js \
            --from ${{ steps.plan.outputs.from }} \
            --to ${{ steps.plan.outputs.to }} \
            --run both

      # Only advance the cursor if the scraper exited cleanly, so a fatal
      # crash retries the same slice next time instead of skipping it.
      - name: Advance cursor
        if: steps.plan.outputs.done == 'false' && steps.run.outcome == 'success' && steps.plan.outputs.manual == 'false'
        run: echo "${{ steps.plan.outputs.next }}" > ci/state/cursor.txt

      # Bounded auto-chain: after a clean batch, fire the next batch of the SAME
      # manual job (start = this batch's end + 1, same final end + batch size).
      # Stops automatically once we pass end_override (chain=false). Only a clean
      # run chains, so a crash halts the chain there and you can re-dispatch from
      # that index. GITHUB_TOKEN is allowed to trigger workflow_dispatch.
      - name: Trigger next chained batch
        if: steps.plan.outputs.chain == 'true' && steps.run.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run scrape.yml --ref main \
            -f start_override=${{ steps.plan.outputs.next }} \
            -f end_override=${{ steps.plan.outputs.final_end }} \
            -f batch_size=${{ steps.plan.outputs.batch }}
          echo "Queued next batch: ${{ steps.plan.outputs.next }} → ${{ steps.plan.outputs.final_end }}"

      # Push this run's scripts, CSVs, and the updated status master to your
      # Google Drive (your 5 TB). Runs even if the scraper failed, so partial
      # work is never lost. `copy` uploads only new/changed files and never
      # deletes anything already on Drive.
      - name: Upload outputs to Google Drive
        if: always()
        run: |
          rclone copy Finalop1lack "gdrive:Finalop1lack" \
            --exclude "allscripts/**" \
            --config ~/.config/rclone/rclone.conf \
            --transfers 4 --checkers 8 --drive-chunk-size 64M \
            --fast-list --stats-one-line --stats 15s -v
          echo "Uploaded to gdrive:Finalop1lack"

      # Progress at a glance on the run's Summary tab — no need to read logs.
      - name: Write run summary
        if: always()
        run: |
          INPUT="InputForScript/unique_indicator_names.txt"
          END=$(grep -oE '^[0-9]+' "$INPUT" | sort -n | tail -1)
          START=$(grep -oE '^[0-9]+' "$INPUT" | sort -n | head -1)
          NEXT=$(tr -dc '0-9' < ci/state/cursor.txt 2>/dev/null || echo "?")
          SCRIPTS=$(find Finalop1lack/script -type f ! -name '.gitkeep' 2>/dev/null | wc -l)
          CSVS=$(find Finalop1lack/csv -type f ! -name '.gitkeep' 2>/dev/null | wc -l)
          {
            echo "## TradingView scrape run"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| This batch | ${{ steps.plan.outputs.from }} – ${{ steps.plan.outputs.to }} |"
            echo "| Scraper outcome | ${{ steps.run.outcome }} |"
            echo "| Cursor now at (next index) | $NEXT |"
            echo "| Overall range | $START – $END |"
            echo "| Pine scripts this batch | $SCRIPTS |"
            echo "| CSVs this batch | $CSVS |"
            echo "| Output destination | Google Drive: \`gdrive:Finalop1lack\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      # Persist this run's (possibly freshly logged-in) profile for the next run.
      - name: Save browser profile
        if: always()
        uses: actions/cache/save@v4
        with:
          path: User_Data
          key: tv-user-data-v2-${{ github.run_id }}

      # Only the tiny resume cursor goes to Git now — the heavy scraped output
      # lives on Google Drive, so `main` stays small and fast to clone.
      - name: Commit cursor
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ci/state/cursor.txt
          if git diff --cached --quiet; then
            echo "Cursor unchanged — nothing to commit."
          else
            git commit -m "scrape: advance cursor after ${{ steps.plan.outputs.from }}-${{ steps.plan.outputs.to }} [skip ci]"
            git push
          fi

      # Logs and any crash screenshots go to artifacts (not committed) for debugging.
      - name: Upload logs & debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: |
            Logs/
            debug/
          if-no-files-found: ignore
          retention-days: 14
